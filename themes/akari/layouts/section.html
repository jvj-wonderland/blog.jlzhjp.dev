{{ define "main" }}
  <div class="content mb-16">
    <h1 class="text-3xl font-bold mb-6 tracking-tight uppercase">{{ .Title }}</h1>
    {{ .Content }}
  </div>

  <div class="space-y-12">
    {{ range .Pages }}
      <article class="group relative flex flex-col items-start p-4 rounded-lg -mx-4 transition-colors hover:bg-zinc-100 dark:hover:bg-zinc-900/50">
        <time datetime="{{ .Date | time.Format "2006-01-02" }}" class="text-xs text-zinc-400 dark:text-zinc-600 mb-2 font-bold tracking-tighter">
          [{{ .Date | time.Format "2006.01.02" }}]
        </time>
        <h2 class="text-lg font-bold group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors">
          <a href="{{ .RelPermalink }}">
            <span class="absolute -inset-x-0 -inset-y-0 z-20"></span>
            <span class="relative z-10">{{ .LinkTitle }}</span>
          </a>
        </h2>
        <p class="mt-2 text-zinc-500 dark:text-zinc-500 text-sm line-clamp-2 italic">
          {{ .Summary }}
        </p>
      </article>
    {{ end }}
  </div>
{{ end }}
