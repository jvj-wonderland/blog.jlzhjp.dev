{{ define "main" }}
  <div class="content mb-20">
    <h1 class="text-3xl font-bold mb-6 tracking-tight">{{ .Title }}</h1>
    <div class="text-zinc-600 dark:text-zinc-400">
      {{ .Content }}
    </div>
  </div>

  <div class="space-y-12">
    <h2 class="text-sm uppercase tracking-widest font-bold text-zinc-700 dark:text-zinc-400 border-b border-zinc-200 dark:border-zinc-800 pb-2">Recent Logs</h2>
    {{ range (where site.RegularPages "Type" "posts") | first 5 }}
      <article class="group relative flex flex-col items-start p-4 rounded-lg -mx-4 transition-colors hover:bg-zinc-100 dark:hover:bg-zinc-900/50">
        <time datetime="{{ .Date | time.Format "2006-01-02" }}" class="text-xs text-zinc-500 dark:text-zinc-400 mb-2 font-bold tracking-tighter">
          [{{ .Date | time.Format "2006.01.02" }}]
        </time>
        <h3 class="text-lg font-bold group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors">
          <a href="{{ .RelPermalink }}">
            <span class="absolute -inset-x-0 -inset-y-0 z-20"></span>
            <span class="relative z-10">{{ .LinkTitle }}</span>
          </a>
        </h3>
        <p class="mt-2 text-zinc-600 dark:text-zinc-400 text-sm line-clamp-2 italic">
          {{ .Summary }}
        </p>
      </article>
    {{ end }}
    
    <div class="pt-6">
      <a href="/posts" class="inline-flex items-center text-xs uppercase tracking-widest font-bold text-emerald-600 dark:text-emerald-400 hover:underline underline-offset-4">
        cd /posts
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 ml-2">
          <path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z" clip-rule="evenodd" />
        </svg>
      </a>
    </div>
  </div>
{{ end }}
